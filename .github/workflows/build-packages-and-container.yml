name: Build Packages And Container

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-packages:
    name: Build And Pack NuGet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Jigen.sln

      - name: Build
        run: dotnet build Jigen.sln --configuration Release --no-restore

      - name: Pack Jigen.Client
        run: dotnet pack src/Client/Jigen.Client/Jigen.Client.csproj --configuration Release --no-build -o artifacts/nuget

      - name: Pack Jigen.Store
        run: dotnet pack src/Jigen/Jigen.Store/Jigen.Store.csproj --configuration Release --no-build -o artifacts/nuget

      - name: Pack Jigen.SemanticTools
        run: dotnet pack src/Jigen/Jigen.SemanticTools/Jigen.SemanticTools.csproj --configuration Release --no-build -o artifacts/nuget

      - name: Pack Jigen.Indexer.HNSW
        run: dotnet pack src/Jigen/Jigen.Indexer.HNSW/Jigen.Indexer.HNSW.csproj --configuration Release --no-build -o artifacts/nuget

      - name: Upload NuGet Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

  build-container:
    name: Build Docker Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Server
        run: dotnet publish src/Server/Jigen/Jigen.csproj --configuration Release -o publish

      - name: Build Docker Image
        run: docker build . -t jigendb:ci-${{ github.sha }}

      - name: Export Docker Image
        run: docker save jigendb:ci-${{ github.sha }} | gzip > artifacts-jigendb-image.tar.gz

      - name: Upload Docker Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jigendb-image
          path: artifacts-jigendb-image.tar.gz
          if-no-files-found: error
