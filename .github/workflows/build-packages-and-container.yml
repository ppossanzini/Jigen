name: Build Packages And Container

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-packages:
    name: Build And Pack NuGet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Jigen.sln

      - name: Build
        run: dotnet build Jigen.sln --configuration Release --no-restore /m:1

      - name: Use Tag Version For NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "PACK_ARGS=/p:PackageVersion=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pack Jigen.Client
        run: dotnet pack src/Client/Jigen.Client/Jigen.Client.csproj --configuration Release --no-build -o artifacts/nuget ${PACK_ARGS}

      - name: Pack Jigen.Store
        run: dotnet pack src/Jigen/Jigen.Store/Jigen.Store.csproj --configuration Release --no-build -o artifacts/nuget ${PACK_ARGS}

      - name: Pack Jigen.Indexer.HNSW
        run: dotnet pack src/Jigen/Jigen.Indexer.HNSW/Jigen.Indexer.HNSW.csproj --configuration Release --no-build -o artifacts/nuget ${PACK_ARGS}

      - name: Push NuGet Packages
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "artifacts/nuget/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate

      - name: Upload NuGet Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

