<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vite App</title>
    <style>
      /* Force dark theme CSS variables on initial load to prevent flash */
      html {
        --font-mono-stack: 'JetBrains Mono', 'IBM Plex Mono', 'Fira Code', 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace;
        --el-font-family: var(--font-mono-stack);
        --theme-name: dark;
        --bg-base: #05070d;
        --bg-layer: #0b1020;
        --bg-layer-soft: #121a2d;
        --surface-1: #0d1427;
        --surface-2: #111a30;
        --surface-3: #0f1a2d;
        --text-main: #f4f8ff;
        --text-muted: #9fb1d1;
        --accent: #6df6ff;
        --accent-soft: #d86dff;
        --accent-violet: #9cb3ff;
        --border-soft: #26314d;
        --app-card-border: 2px dashed var(--border-soft);
        --focus-ring: rgba(109, 246, 255, 0.34);
        --success: #63d9a0;
        --danger: #ff6ca3;
        --app-info-bg: rgba(9, 15, 30, 0.92);
        --app-info-border: rgba(156, 179, 255, 0.22);
        --app-info-title: var(--text-main);
        --app-info-text: #c5d4f2;
        --app-table-bg: rgba(8, 13, 26, 0.95);
        --app-table-row-bg: rgba(8, 13, 26, 0.95);
        --app-table-stripe-bg: rgba(12, 19, 35, 0.96);
        --app-table-header-bg: rgba(16, 24, 42, 0.95);
        --app-table-hover-bg: rgba(26, 38, 66, 0.88);
        --app-table-border: rgba(156, 179, 255, 0.18);
        --app-table-text: var(--text-main);
        --app-table-header-text: #cbd8f3;
        --app-table-empty-bg: rgba(10, 16, 32, 0.96);
      }
      html[data-theme='light'] {
        --theme-name: light;
        --bg-base: #f3f6fd;
        --bg-layer: #ffffff;
        --bg-layer-soft: #eef3ff;
        --surface-1: #ffffff;
        --surface-2: #f7f9ff;
        --surface-3: #eef3ff;
        --text-main: #111827;
        --text-muted: #4b5563;
        --border-soft: #c9d3ea;
        --app-card-border: 1px dashed var(--border-soft);
        --focus-ring: rgba(37, 99, 235, 0.34);
        --app-info-bg: #eef3ff;
        --app-info-border: #c8d5f3;
        --app-info-title: #0f172a;
        --app-info-text: #334155;
        --app-table-bg: #ffffff;
        --app-table-row-bg: #ffffff;
        --app-table-stripe-bg: #f6f9ff;
        --app-table-header-bg: #edf2ff;
        --app-table-hover-bg: #dbe7ff;
        --app-table-border: #c8d5f3;
        --app-table-text: #1f2937;
        --app-table-header-text: #334155;
        --app-table-empty-bg: #ffffff;
      }
      body {
        color-scheme: dark;
        background: #05070d;
        color: #f4f8ff;
      }
      html[data-theme='light'] body {
        color-scheme: light;
        background: #f3f6fd;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
