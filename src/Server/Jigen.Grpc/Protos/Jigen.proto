syntax = "proto3";
import "google/protobuf/empty.proto";
package jigen;
option csharp_namespace = "Jigen.Proto";

service StoreCollectionService {
  rpc ListCollections (CollectionKey) returns (ListCollectionResult);
  rpc GetContent (ItemKey) returns (RawContentResult);
  // Stored full-precision embedding of a key. Empty Embeddings when the key
  // does not exist or the entry was stored without a vector.
  rpc GetEmbedding (ItemKey) returns (EmbeddingResponse);
  rpc SetDocument (Document) returns (Result);
  rpc SetVector (Vector) returns (Result);
  // Bulk ingestion: one call, many entries. Avoids the per-item round trip of
  // SetVector/SetDocument; SetDocuments also batches the server-side embedding
  // calculation of the streamed sentences.
  rpc SetVectors (stream Vector) returns (IngestResult);
  rpc SetDocuments (stream Document) returns (IngestResult);
  rpc SearchVector(SearchVectorRequest) returns(SearchVectorResponse);
  rpc SearchDocument(SearchDocumentRequest) returns(SearchVectorResponse);
  rpc DeleteVector(ItemKey) returns(Result);
  rpc GetAllKeys(CollectionKey) returns(KeysResult);
  // Keys in chunks over a server stream: use instead of GetAllKeys on large
  // collections, where a single KeysResult would exceed the message size cap.
  rpc StreamKeys(StreamKeysRequest) returns(stream KeysResult);
  rpc Contains(ItemKey) returns(Result);
  rpc Clear(CollectionKey) returns(Result);
  rpc Count(CollectionKey) returns(CountResult);

  rpc CalculateEmbeddings (EmbeddingRequest) returns (EmbeddingResponse);
  rpc CalculateEmbeddingsBatch (EmbeddingBatchRequest) returns (EmbeddingBatchResponse);
}

message ItemKey{
  string Database = 1;
  string Collection = 2;
  bytes Key = 3;
}

message CollectionKey{
  string Database = 1;
  string Collection = 2;
}

message KeysResult{
  repeated bytes Keys = 1;
}

message StreamKeysRequest{
  string Database = 1;
  string Collection = 2;
  // Keys per streamed message; 0 = server default (1000).
  int32 ChunkSize = 3;
}

message CountResult{
  int32 Count = 1;
}

message Document {
  string Database = 1;
  string Collection = 2;
  bytes Key = 3;
  bytes Content = 4;
  string Sentence = 5;
}

message Vector {
  string Database = 1;
  string Collection = 2;
  bytes Key = 3;
  bytes Content = 4;
  repeated float Embeddings = 5;
}

// Per-query search tuning, shared by SearchVectorRequest and
// SearchDocumentRequest. Every field is optional: the zero value keeps the
// server's configured behavior.
// - EfSearch: HNSW beam width override for this query (recall vs latency);
//   0 = server default. Ignored by exact (brute force) indexes.
// - NoContent: return keys and scores only, skipping the content bytes.
// - MinScore: drop results scoring below this similarity.
message SearchTuning {
  int32 EfSearch = 1;
  bool NoContent = 2;
  optional float MinScore = 3;
}

message SearchVectorRequest {
  string Database = 1;
  string Collection = 2;
  repeated float Embeddings = 3;
  int32 Top = 4;
  FilterNode Filter = 5;
  SearchTuning Tuning = 6;
}

message SearchVectorResult {
  bytes Key = 1;
  bytes Content = 2;
  float Score = 3;
}

message SearchVectorResponse {
  repeated SearchVectorResult Results = 1;
}

message SearchDocumentRequest {
  string Database = 1;
  string Collection = 2;
  string Sentence = 3;
  int32 Top = 4;
  FilterNode Filter = 5;
  SearchTuning Tuning = 6;
}

message FilterNode {
  oneof Kind {
    PropertyEqualsCondition Equals = 1;
    PropertyCollectionAnyCondition CollectionAny = 2;
    LogicalCondition And = 3;
    LogicalCondition Or = 4;
  }
}

message PropertyEqualsCondition {
  string PropertyPath = 1;
  FilterValue Value = 2;
}

message PropertyCollectionAnyCondition {
  string PropertyPath = 1;
  FilterValue Value = 2;
}

message LogicalCondition {
  FilterNode Left = 1;
  FilterNode Right = 2;
}

message FilterValue {
  oneof Kind {
    string StringValue = 1;
    int32 IntValue = 2;
    int64 LongValue = 3;
    double DoubleValue = 4;
    bool BoolValue = 5;
    bool NullValue = 6;
  }
}

message Result {
  bool Success = 1;
  string Message = 2;
}

message IngestResult {
  bool Success = 1;
  string Message = 2;
  // Entries accepted into the ingestion pipeline. Durability follows the
  // server's group-commit policy, like the unary Set operations.
  int32 Accepted = 3;
}

message EmbeddingRequest {
  string Message = 1;
  string Task = 2;
}

message EmbeddingResponse {
  repeated float Embeddings = 1;
}

message EmbeddingBatchRequest {
  repeated string Messages = 1;
  string Task = 2;
}

message EmbeddingBatchResponse {
  // One entry per input message, same order. An input the model could not
  // embed yields an entry with an empty Embeddings list.
  repeated EmbeddingResponse Results = 1;
}

message ListCollectionResult{
  repeated string collections = 1;
}

message RawContentResult{
  bytes content = 1;
}

message JsonContentResult{
  string content = 1;
}